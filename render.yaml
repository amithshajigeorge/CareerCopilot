# Render Blueprint Specification for CareerCopilot AI
# Reference: https://render.com/docs/blueprints

services:
  - type: web
    name: careercopilot-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PROJECT_NAME
        value: "CareerCopilot AI"
      - key: API_V1_STR
        value: "/api/v1"
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
