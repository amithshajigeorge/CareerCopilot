version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: careercopilot-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=careercopilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: careercopilot-backend
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=careercopilot
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/careercopilot
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-supersecretkeychangeinproduction1234567890}
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - hf_cache:/app/cache
    restart: always

  frontend:
    build: ./frontend
    container_name: careercopilot-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  hf_cache:
